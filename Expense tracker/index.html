<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Expense Tracker & Budget Gauge</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="tracker-wrapper">
        <header>
            <h1>Daily Expense Tracker 💸</h1>
            <p>Monitor your daily spending and manage your budget limits seamlessly</p>
        </header>

        <!-- Top Overview Budget Cards Row Container -->
        <div class="metrics-grid">
            <div class="metric-card total-budget">
                <h3>Set Daily Limit</h3>
                <div class="amount">₦<span id="display-budget">20,000</span></div>
            </div>
            <div class="metric-card total-spent">
                <h3>Total Spent Today</h3>
                <div class="amount" id="display-spent">₦0.00</div>
            </div>
            <div class="metric-card balance-left">
                <h3>Remaining Balance</h3>
                <div class="amount" id="display-balance">₦20,000</div>
            </div>
        </div>

        <!-- Progress Gauge Bar Tracker Section -->
        <div class="gauge-section">
            <div class="gauge-label">Budget Consumption: <span id="gauge-pct">0%</span></div>
            <div class="gauge-track">
                <div class="gauge-fill" id="gauge-fill-bar"></div>
            </div>
        </div>

        <!-- Main Form Input and Data Grid Split Panel Box -->
        <div class="main-panel">
            <!-- Left Column Component: Log Input Form -->
            <div class="form-container">
                <h2>Log New Expense</h2>
                <form id="expense-form">
                    <div class="form-group">
                        <label for="budget-limit-input">Update Daily Limit (Optional):</label>
                        <input type="number" id="budget-limit-input" value="20000" placeholder="e.g. 20000">
                    </div>
                    <div class="form-group">
                        <label for="item-desc">Item Description:</label>
                        <input type="text" id="item-desc" placeholder="e.g. Chicken & Chips, Mobile Data" required>
                    </div>
                    <div class="form-group">
                        <label for="item-amount">Amount Spent (NGN):</label>
                        <input type="number" id="item-amount" placeholder="e.g. 3500" required>
                    </div>
                    <div class="form-group">
                        <label for="item-category">Category:</label>
                        <select id="item-category">
                            <option value="Food">🍔 Food / Groceries</option>
                            <option value="Data">📱 Data / Internet</option>
                            <option value="Transport">🚖 Transport</option>
                            <option value="Entertainment">🎬 Entertainment</option>
                            <option value="Other">💡 Other Necessities</option>
                        </select>
                    </div>
                    <button type="submit" class="submit-btn">Add Expense ➕</button>
                </form>
            </div>

            <!-- Right Column Component: Visual Data Table List Log -->
            <div class="log-container">
                <h2>Today's Spending Ledger</h2>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Description</th>
                                <th>Category</th>
                                <th>Amount</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="ledger-rows">
                            <!-- JavaScript will insert rows here dynamically -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
